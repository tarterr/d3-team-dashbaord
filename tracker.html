<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workflow Tracker - ต๊ะ บพค.</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--navy:#053075;--teal:#00587E;--emerald:#14938C;--orange:#E6961A;--bg:#F2F4F7;--card:rgba(255,255,255,.65);--card-border:rgba(255,255,255,.8);--card-solid:#fff;--text:#111827;--text2:#374151;--muted:#6B7280;--muted2:#9CA3AF;--danger:#DC2626}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans Thai','SF Pro Display',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hdr{background:rgba(5,48,117,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:10px 20px;position:sticky;top:0;z-index:100}
.hdr-in{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.hdr h1{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.3px}
.nav{display:flex;gap:2px;background:rgba(255,255,255,.12);border-radius:8px;padding:2px}
.nav-b{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:500;background:transparent;color:rgba(255,255,255,.55);transition:.15s}
.nav-b.on{background:rgba(255,255,255,.2);color:#fff}
.nav-b:hover:not(.on){color:rgba(255,255,255,.8)}
.b{padding:7px 16px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;transition:.15s}
.bp{background:var(--teal);color:#fff}.bp:hover{background:var(--navy)}
.bd{background:var(--danger);color:#fff}
.bg{background:#fff;border:1px solid #D1D5DB;color:var(--text2)}.bg:hover{border-color:var(--teal);color:var(--teal)}
.bg2{background:var(--navy);color:#fff;border:none}.bg2:hover{background:var(--teal)}
.bs{padding:5px 12px;font-size:10px}
.ct{max-width:1200px;margin:0 auto;padding:16px 20px}
.pg{display:none}.pg.on{display:block}
.cd{background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--card-border);border-radius:14px;padding:16px;margin-bottom:14px}
.sg{display:grid;gap:10px;margin-bottom:14px}
.sg4{grid-template-columns:repeat(4,1fr)}.sg3{grid-template-columns:repeat(3,1fr)}.sg5{grid-template-columns:repeat(5,1fr)}
.st{background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--card-border);border-radius:14px;padding:14px 16px}
.st .lb{font-size:11px;color:var(--muted);font-weight:500;margin-bottom:2px}
.st .vl{font-size:24px;font-weight:700;letter-spacing:-.5px}
.alb{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);border-radius:14px;padding:14px 16px;margin-bottom:14px}
.alb h4{font-size:12px;color:var(--danger);font-weight:600;margin-bottom:6px}
.ali{font-size:12px;color:var(--text2);padding:4px 0;border-bottom:1px solid rgba(239,68,68,.08);line-height:1.5}
.ali:last-child{border:none}
.tb{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.sb{flex:1;min-width:180px;padding:8px 14px;border-radius:10px;border:1px solid #E5E7EB;background:var(--card-solid);color:var(--text);font-size:12px;font-family:inherit;outline:none}
.sb:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,88,126,.1)}
.fs{padding:8px 12px;border-radius:10px;border:1px solid #E5E7EB;background:var(--card-solid);color:var(--text);font-size:11px;font-family:inherit;outline:none;cursor:pointer}
.tw{overflow-x:auto;max-height:55vh;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{position:sticky;top:0;z-index:10}
th{padding:8px 10px;text-align:left;background:rgba(249,250,251,.95);backdrop-filter:blur(8px);color:var(--muted);font-weight:600;border-bottom:1px solid #E5E7EB;white-space:nowrap;font-size:11px;cursor:pointer}
td{padding:7px 10px;border-bottom:1px solid #F3F4F6}
tr:nth-child(even){background:rgba(249,250,251,.5)}
tr:hover{background:rgba(0,88,126,.04)}
.bdg{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;white-space:nowrap}
.pl{color:var(--teal);font-size:11px;font-weight:500;cursor:pointer}
.pl:hover{text-decoration:underline}
.pipe{display:flex;flex-direction:column;gap:1px}
.stp{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;transition:.15s}
.stp-done{background:rgba(20,147,140,.06)}
.stp-cur{background:rgba(230,150,26,.08);border:1.5px solid rgba(230,150,26,.25);border-radius:10px}
.stp-skip{opacity:.35}
.stp-wait{}
.dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.dot-done{background:var(--emerald);color:#fff}
.dot-cur{background:var(--orange);color:#fff}
.dot-skip{background:transparent;border:1.5px dashed var(--muted2);color:var(--muted2)}
.dot-wait{background:transparent;border:1.5px solid #D1D5DB;color:var(--muted2)}
.stp-info{flex:1;min-width:0}
.stp-name{font-size:12px;font-weight:500}
.stp-meta{font-size:10px;color:var(--muted2);margin-top:1px}
.stp-dl{color:var(--orange)}.stp-over{color:var(--danger);font-weight:600}
.prog{display:flex;align-items:center;gap:6px}
.prog-bar{flex:1;height:6px;background:rgba(0,0,0,.06);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px}
.prog-txt{font-size:10px;color:var(--muted2);min-width:28px;text-align:right}
.mo{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:14px}
.md{background:var(--card-solid);border:1px solid #E5E7EB;border-radius:16px;width:100%;max-width:650px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.12)}
.md-h{padding:16px 20px;border-bottom:1px solid #F3F4F6;display:flex;justify-content:space-between;align-items:center}
.md-h h2{font-size:16px;font-weight:600;color:var(--text)}
.md-b{padding:20px}
.md-f{padding:12px 20px;border-top:1px solid #F3F4F6;display:flex;justify-content:flex-end;gap:6px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fgi{display:flex;flex-direction:column;gap:4px}
.fgi.fl{grid-column:1/-1}
.fgl{font-size:11px;font-weight:500;color:var(--muted)}
.fi,.fsl,.fta{padding:8px 12px;border-radius:10px;border:1px solid #E5E7EB;background:var(--card-solid);color:var(--text);font-size:12px;font-family:inherit;outline:none}
.fi:focus,.fsl:focus,.fta:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,88,126,.1)}
.fta{min-height:50px;resize:vertical}
.sop-chk{display:flex;flex-direction:column;gap:4px;margin-top:10px}
.sop-chk label{display:flex;align-items:center;gap:8px;font-size:12px;padding:4px 0;cursor:pointer;color:var(--text2)}
.sop-chk input{accent-color:var(--emerald);width:16px;height:16px}
.ld{display:flex;align-items:center;justify-content:center;padding:30px;flex-direction:column;gap:8px;color:var(--muted);font-size:12px}
.sp{width:28px;height:28px;border:3px solid #E5E7EB;border-top:3px solid var(--teal);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:18px;right:18px;padding:12px 18px;border-radius:12px;font-size:12px;font-weight:500;z-index:300;animation:si .3s;box-shadow:0 8px 30px rgba(0,0,0,.12)}
.t-ok{background:var(--emerald);color:#fff}.t-err{background:var(--danger);color:#fff}
@keyframes si{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.back-btn{font-size:12px;color:var(--teal);cursor:pointer;margin-bottom:12px;display:inline-flex;align-items:center;gap:4px;font-weight:500}
.back-btn:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-in">
  <div style="display:flex;align-items:center;gap:10px">
    <div>
      <h1>ระบบติดตามการทำงาน (Workflow Tracker System)</h1>
      <span style="font-size:10px;color:rgba(255,255,255,.5)">ผู้ทำรายการ : นายจักรพันธ์ สาครชัยเจริญ</span>
    </div>
  </div>
  <div class="nav">
    <button class="nav-b on" data-p="dash">Dashboard</button>
    <button class="nav-b" data-p="list">กิจกรรม</button>
    <button class="nav-b" data-p="report">รายงาน</button>
  </div>
  <div style="display:flex;gap:4px;align-items:center">
    <span id="sync" style="font-size:9px;color:rgba(255,255,255,.5)"></span>
    <button class="b bs" style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)" onclick="load()">🔄 รีเฟรช</button>
    <button class="b bs" style="background:#E6961A;color:#fff" onclick="openAdd()">+ สร้างกิจกรรม</button>
  </div>
</div></div>

<div class="ct">
  <div id="pg-dash" class="pg on"></div>
  <div id="pg-list" class="pg"></div>
  <div id="pg-detail" class="pg"></div>
  <div id="pg-log" class="pg"></div>
  <div id="pg-report" class="pg"></div>
</div>
<div id="modal"></div>
<div id="toasts"></div>

<script>
const API='https://script.google.com/macros/s/AKfycbyRxK9dBVcSgyjTR6f5KegtbOq9d5WOte_9plH_cHYPjgIHgoWhi4HsRWWEE6ky3FhV/exec';
let D=[],P=[],T={},TK=[];
const SC={'เสร็จ':'#14938C','รอ':'#7A9BBF','ข้าม':'#475569'};
const TC={'การทำสัญญา':'#00587E','เบิกจ่ายเงินงวด':'#E6961A','ส่งผู้ทรงประเมินรายงาน':'#8B5CF6','เบิกเงินงวดสุดท้าย':'#EC4899','แจ้งคืนเงินคงเหลือ':'#06B6D4','อนุมัติปิดโครงการ':'#64748B','จัดทำหนังสือรับรอง':'#10B981','ขออนุมัติขยายเวลา':'#EF4444','ขออนุมัติเปลี่ยนงบ':'#D946EF','งานอื่นๆ':'#94A3B8'};
function tc(t){return TC[t]||'#94A3B8'}

// Helper: แสดงรหัส + ชื่อ PI ในวงเล็บ
function piLabel(code){
  if(!code||code==='งานอื่นๆ')return'งานอื่นๆ';
  const p=P.find(x=>x.code===code);
  if(p&&p.pi)return code+' ('+p.pi+')';
  return code;
}

// Nav
document.querySelectorAll('.nav-b').forEach(b=>b.onclick=function(){
  document.querySelectorAll('.nav-b').forEach(x=>x.classList.remove('on'));
  this.classList.add('on');
  document.querySelectorAll('.pg').forEach(x=>x.classList.remove('on'));
  document.getElementById('pg-'+this.dataset.p).classList.add('on');
});

function showPage(p){
  document.querySelectorAll('.nav-b').forEach(x=>{x.classList.remove('on');if(x.dataset.p===p)x.classList.add('on')});
  document.querySelectorAll('.pg').forEach(x=>x.classList.remove('on'));
  document.getElementById('pg-'+p).classList.add('on');
}

// API
async function api(p){const u=new URL(API);for(let k in p)u.searchParams.set(k,p[k]);const r=await fetch(u);return r.json();}

async function load(){
  try{
    const[a,p,t]=await Promise.all([api({action:'getActivities'}),api({action:'getProjects'}),api({action:'getTemplates'})]);
    if(a.success)D=a.data;
    if(p.success)P=p.data;
    if(t.success){T=t.templates;TK=t.types;}
    renderDash();renderList();renderReport();
    document.getElementById('sync').textContent=new Date().toLocaleTimeString('th-TH');
  }catch(e){console.error(e);toast('โหลดข้อมูลไม่สำเร็จ','err');}
}

// ============================================================
// DASHBOARD
// ============================================================
function renderDash(){
  const now=new Date();
  let total=D.length,active=0,done=0,nearDL=0,worDL=0;
  const alerts=[];
  const nextActions=[];

  D.forEach(a=>{
    const steps=a.steps||[];
    const doneSteps=steps.filter(s=>s['สถานะ']==='เสร็จ').length;
    const totalSteps=steps.length;
    const allDone=totalSteps>0&&doneSteps===totalSteps;
    if(allDone)done++;else active++;

    // Find current step (first non-done, non-skip)
    const cur=steps.find(s=>s['สถานะ']==='รอ');
    if(cur&&!allDone){
      nextActions.push({act:a,step:cur,doneSteps,totalSteps});
    }

    // Check deadline - activity level
    if(a.deadline&&!allDone){
      const dl=new Date(a.deadline);
      const diff=Math.ceil((dl-now)/(864e5));
      if(diff<0){worDL++;alerts.push({a,step:cur,diff,over:true});}
      else if(diff<=7){nearDL++;alerts.push({a,step:cur,diff,over:false});}
    }
    // Check step-level deadlines
    if(cur&&cur.deadline&&!allDone){
      const dl2=new Date(cur.deadline);
      const diff2=Math.ceil((dl2-now)/(864e5));
      if(diff2<0&&!alerts.find(x=>x.a.id===a.id)){alerts.push({a,step:cur,diff:diff2,over:true,stepLevel:true});worDL++;}
      else if(diff2<=7&&diff2>=0&&!alerts.find(x=>x.a.id===a.id)){alerts.push({a,step:cur,diff:diff2,over:false,stepLevel:true});nearDL++;}
    }
  });

  alerts.sort((a,b)=>a.diff-b.diff);

  let h=`<div class="sg sg4">
    <div class="st"><div class="lb">กิจกรรมทั้งหมด</div><div class="vl" style="color:#00587E">${total}</div></div>
    <div class="st"><div class="lb">กำลังดำเนินการ</div><div class="vl" style="color:#E6961A">${active}</div></div>
    <div class="st"><div class="lb">ใกล้ครบ/เลยกำหนด</div><div class="vl" style="color:#DC2626">${nearDL+worDL}</div></div>
    <div class="st"><div class="lb">เสร็จสิ้น</div><div class="vl" style="color:#22C55E">${done}</div></div>
  </div>`;

  // Alerts
  if(alerts.length){
    h+=`<div class="alb"><h4>⚠️ แจ้งเตือน deadline (${alerts.length} รายการ)</h4>`;
    alerts.forEach(x=>{
      const label=x.over?`<span style="color:#DC2626;font-weight:700">เลยกำหนด ${Math.abs(x.diff)} วัน</span>`:`<span style="color:#E6961A;font-weight:600">เหลือ ${x.diff} วัน</span>`;
      h+=`<div class="ali"><span class="pl" onclick="openDetail('${x.a.id}')">${piLabel(x.a['รหัสโครงการ'])}</span> ${x.a['ชื่อกิจกรรม']||''} → <b>${x.step?x.step['ชื่อขั้นตอน']:'—'}</b> ${label}</div>`;
    });
    h+=`</div>`;
  }else{
    h+=`<div class="cd" style="text-align:center;color:#22C55E;font-size:11px;padding:10px">✅ ไม่มีงานใกล้ครบกำหนด</div>`;
  }

  // Next actions
  if(nextActions.length){
    h+=`<div class="cd"><h3 style="font-size:12px;font-weight:600;color:#111827;margin-bottom:8px">ขั้นตอนถัดไปที่ต้องทำ (${nextActions.length} กิจกรรม)</h3><div class="tw"><table><thead><tr><th>วันที่</th><th>โครงการ</th><th>หัวหน้าโครงการ</th><th>กิจกรรมที่ดำเนินการ</th><th>ขั้นตอนถัดไป</th><th style="min-width:100px">progress</th><th></th></tr></thead><tbody>`;
    nextActions.forEach(({act:a,step:s,doneSteps:ds,totalSteps:ts})=>{
      const pct=ts?Math.round(ds/ts*100):0;
      const col=pct>=75?'#14938C':pct>=50?'#00587E':'#E6961A';
      const proj=P.find(x=>x.code===a['รหัสโครงการ']);
      const piName=proj?proj.pi:'—';
      h+=`<tr>
        <td style="font-size:10px;white-space:nowrap;color:var(--muted)">${fmtD(a['สร้างเมื่อ'])}</td>
        <td><span class="pl" onclick="openDetail('${a.id}')">${a['รหัสโครงการ']||'งานอื่นๆ'}</span></td>
        <td style="font-size:11px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${piName}">${piName}</td>
        <td style="font-size:11px">${a['ชื่อกิจกรรม']||a['ประเภทกิจกรรม']||''}</td>
        <td><span class="bdg" style="background:rgba(230,150,26,.1);color:#E6961A">${s['ชื่อขั้นตอน']}</span></td>
        <td><div class="prog"><div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${col}"></div></div><span class="prog-txt">${ds}/${ts}</span></div></td>
        <td style="white-space:nowrap"><button class="b bs" style="background:var(--teal);color:#fff" onclick="openDetail('${a.id}')">ดู</button> <button class="b bs" style="background:#F3F4F6;color:var(--teal);border:1px solid #D1D5DB" onclick="openProjectLog('${a['รหัสโครงการ']}')">Log</button></td>
      </tr>`;
    });
    h+=`</tbody></table></div></div>`;
  }

  document.getElementById('pg-dash').innerHTML=h;
}

// ============================================================
// ACTIVITY LIST
// ============================================================
function initListToolbar(){
  document.getElementById('pg-list').innerHTML=`
    <div class="tb">
      <input class="sb" id="lsearch" placeholder="🔍 ค้นหา..." oninput="renderListBody()">
      <select class="fs" id="lproj" onchange="renderListBody()"><option value="">ทุกโครงการ</option>${P.map(p=>`<option value="${p.code}">${piLabel(p.code)}</option>`).join('')}<option value="งานอื่นๆ">งานอื่นๆ</option></select>
      <select class="fs" id="ltype" onchange="renderListBody()"><option value="">ทุกประเภท</option>${TK.map(t=>`<option value="${t}">${t}</option>`).join('')}</select>
      <select class="fs" id="lstatus" onchange="renderListBody()"><option value="">ทุกสถานะ</option><option value="active">กำลังดำเนินการ</option><option value="done">เสร็จสิ้น</option></select>
    </div>
    <div class="cd" style="padding:0">
      <div style="padding:8px 14px;border-bottom:1px solid #F3F4F6;font-size:11px;color:#94A3B8" id="listCount"></div>
      <div class="tw"><table><thead id="listHead"></thead><tbody id="listBody"></tbody></table></div>
    </div>`;
  renderListBody();
}

function renderList(){ initListToolbar(); }

function renderListBody(){
  const sq=(document.getElementById('lsearch')||{}).value||'';
  const fp=(document.getElementById('lproj')||{}).value||'';
  const ft=(document.getElementById('ltype')||{}).value||'';
  const fst=(document.getElementById('lstatus')||{}).value||'';

  let fd=D.filter(a=>{
    if(fp==='งานอื่นๆ'&&a['รหัสโครงการ']!=='งานอื่นๆ')return false;
    if(fp&&fp!=='งานอื่นๆ'&&a['รหัสโครงการ']!==fp)return false;
    if(ft&&a['ประเภทกิจกรรม']!==ft)return false;
    const steps=a.steps||[];
    const allDone=steps.length>0&&steps.filter(s=>s['สถานะ']==='เสร็จ').length===steps.length;
    if(fst==='done'&&!allDone)return false;
    if(fst==='active'&&allDone)return false;
    if(sq){const hay=[a['ชื่อกิจกรรม'],a['รหัสโครงการ'],a['ชื่อโครงการ'],a['ประเภทกิจกรรม'],a['หมายเหตุ'],piLabel(a['รหัสโครงการ'])].join(' ').toLowerCase();if(!hay.includes(sq.toLowerCase()))return false;}
    return true;
  });

  document.getElementById('listCount').textContent=`แสดง ${fd.length} จาก ${D.length}`;
  document.getElementById('listHead').innerHTML=`<tr><th></th><th>วันที่สร้าง</th><th>กิจกรรม</th><th>ประเภท</th><th>โครงการ</th><th>progress</th><th>deadline</th><th></th></tr>`;

  const now=new Date();
  let rows='';
  fd.forEach(a=>{
    const steps=a.steps||[];
    const ds=steps.filter(s=>s['สถานะ']==='เสร็จ').length;
    const ts=steps.length;
    const allDone=ts>0&&ds===ts;
    const pct=ts?Math.round(ds/ts*100):0;
    const col=allDone?'#14938C':pct>=50?'#00587E':'#E6961A';
    let dlCls='';

      <td class="${dlCls}" style="font-size:10px;white-space:nowrap">${fmtD(a.deadline)}</td>

    </tr>`;
  });
  document.getElementById('listBody').innerHTML=rows||'<tr><td colspan="8" style="text-align:center;padding:20px;color:#64748B">ไม่พบกิจกรรม</td></tr>';

function openDetail(id){

}

function renderDetail(a){
  const steps=a.steps||[];
  const ds=steps.filter(s=>s['สถานะ']==='เสร็จ').length;
  const ts=steps.length;
  const pct=ts?Math.round(ds/ts*100):0;
  const allDone=ts>0&&ds===ts;
  const now=new Date();

  let h=`<span class="back-btn" onclick="showPage('list')">← กลับรายการ</span>`;

  // Header card
  h+=`<div class="cd" style="padding:16px">
    ${a['ชื่อโครงการ']?`<p style="font-size:13px;font-weight:500;color:var(--navy);margin-bottom:6px;line-height:1.5">${a['ชื่อโครงการ']}</p>`:''}
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
      <div>
        <span class="pl" style="font-size:11px">${piLabel(a['รหัสโครงการ'])}</span>
        <h2 style="font-size:16px;font-weight:700;margin:2px 0">${a['ชื่อกิจกรรม']||a['ประเภทกิจกรรม']||''}</h2>
        <span class="bdg" style="background:${tc(a['ประเภทกิจกรรม'])}20;color:${tc(a['ประเภทกิจกรรม'])}">${a['ประเภทกิจกรรม']||'-'}</span>
      </div>
      <div style="text-align:right">
        ${a.deadline?`<p style="font-size:10px;color:var(--muted)">deadline</p><p style="font-size:13px;font-weight:600;color:${allDone?'#14938C':'#E6961A'}">${fmtD(a.deadline)}</p>`:''}
        <span class="bdg" style="margin-top:4px;background:${allDone?'rgba(20,147,140,.1)':'rgba(230,150,26,.1)'};color:${allDone?'#14938C':'#E6961A'}">${allDone?'✅ เสร็จทั้งหมด':'กำลังดำเนินการ'}</span>
      </div>
    </div>
    <div style="margin-top:10px">
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:3px"><span>ความคืบหน้า</span><span>${ds}/${ts} (${pct}%)</span></div>
      <div style="height:8px;background:rgba(0,0,0,.06);border-radius:4px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${allDone?'#14938C':'#00587E'};border-radius:4px;transition:.3s"></div></div>
    </div>
  </div>`;

  // SOP Pipeline
  h+=`<div class="cd"><h3 style="font-size:12px;font-weight:600;color:#111827;margin-bottom:10px">ขั้นตอน SOP</h3><div class="pipe">`;

  let foundCurrent=false;
  steps.forEach((s,i)=>{
    const st=s['สถานะ']||'รอ';
    const isDone=st==='เสร็จ';
    const isSkip=st==='ข้าม';
    const isCurrent=!isDone&&!isSkip&&!foundCurrent;
    if(isCurrent)foundCurrent=true;

    const cls=isDone?'stp stp-done':isCurrent?'stp stp-cur':isSkip?'stp stp-skip':'stp stp-wait';
    const dotCls=isDone?'dot dot-done':isCurrent?'dot dot-cur':isSkip?'dot dot-skip':'dot dot-wait';
    const dotTxt=isDone?'✓':isSkip?'—':s['ลำดับ']||i+1;

    let meta='';
    if(isDone&&s['วันที่เสร็จ'])meta=`เสร็จ ${fmtD(s['วันที่เสร็จ'])}`;
    if(isSkip)meta='ข้ามขั้นตอนนี้';
    if(s.deadline&&!isDone&&!isSkip){
      const dl=new Date(s.deadline);
      const diff=Math.ceil((dl-now)/864e5);
      if(diff<0)meta+=` <span class="stp-over">deadline: ${fmtD(s.deadline)} (เลย ${Math.abs(diff)} วัน)</span>`;
      else if(diff<=7)meta+=` <span class="stp-dl">deadline: ${fmtD(s.deadline)} (${diff} วัน)</span>`;
      else meta+=`deadline: ${fmtD(s.deadline)}`;
    }

    h+=`<div class="${cls}">
      <div class="${dotCls}">${dotTxt}</div>
      <div class="stp-info">
        <div class="stp-name" style="color:${isDone?'#14938C':isCurrent?'#E6961A':isSkip?'#64748B':'#94A3B8'};${isSkip?'text-decoration:line-through':''}">
          ${s['ลำดับ']}. ${s['ชื่อขั้นตอน']}
        </div>
        ${meta?`<div class="stp-meta">${meta}</div>`:''}
      </div>
      <div style="display:flex;gap:4px">
        ${isCurrent?`<button class="b bs" style="background:var(--emerald);color:#fff" onclick="markStep(${s._row},'เสร็จ','${a.id}')">✓ เสร็จ</button><button class="b bs" style="background:#F3F4F6;color:var(--muted);border:1px solid #D1D5DB" onclick="markStep(${s._row},'ข้าม','${a.id}')">ข้าม</button>`:''}
        ${isDone?`<button class="b bs" style="background:#F3F4F6;color:var(--text2);border:1px solid #D1D5DB" onclick="markStep(${s._row},'รอ','${a.id}')">↩ ย้อน</button>`:''}
        ${isSkip?`<button class="b bs" style="background:#F3F4F6;color:var(--text2);border:1px solid #D1D5DB" onclick="markStep(${s._row},'รอ','${a.id}')">↩ คืน</button>`:''}
      </div>
    </div>`;
  });

  h+=`</div></div>`;

  // Activity info + actions
  h+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
    <button class="b bs" style="background:var(--teal);color:#fff" onclick="openProjectLog('${a['รหัสโครงการ']}')">📜 Log โครงการ</button>
    <button class="b bs" style="background:var(--navy);color:#fff" onclick="openEditAct('${a.id}')">✏️ แก้ไขกิจกรรม</button>
    <button class="b bs" style="background:#FEE2E2;color:#DC2626;border:1px solid #FECACA" onclick="confirmDel('${a.id}','${(a['ชื่อกิจกรรม']||'').substring(0,20).replace(/'/g,"\\'")}')">🗑️ ลบกิจกรรม</button>
  </div>`;

  document.getElementById('pg-detail').innerHTML=h;
}

async function markStep(stepRow, status, actId){
  toast('กำลังบันทึก...','ok');
  await api({action:'updateStep', data:JSON.stringify({stepRow, status})});
  await load();
  const a=D.find(x=>x.id===actId);
  if(a)renderDetail(a);
  toast('อัปเดตสำเร็จ','ok');
}

function filterProjects(){
  const q=document.getElementById('fa_proj_search').value.toLowerCase();

  dd.style.display='block';
  dd.querySelectorAll('.proj-item').forEach(el=>{

}

function selectProject(code, label){

function loadSOP(){
  const type=document.getElementById('fa_type').value;

  let h=`<div style="margin-top:12px"><p style="font-size:11px;color:#22C55E;margin-bottom:6px">✅ SOP "${type}" (${steps.length} ขั้นตอน) — เอาติ๊กออกเพื่อข้าม</p><div class="sop-chk">`;

  h+=`</div></div>`;

async function saveAdd(){
  const projCode=document.getElementById('fa_proj').value;
  const isOther=projCode==='งานอื่นๆ';
  const projName=isOther?(document.getElementById('fa_other').value||'งานอื่นๆ'):(P.find(p=>p.code===projCode)||{}).name||'';
  const type=document.getElementById('fa_type').value;
  const name=document.getElementById('fa_name').value;
  const dl=document.getElementById('fa_dl').value;
  const note=document.getElementById('fa_note').value;
  if(!name){toast('กรุณากรอกชื่อกิจกรรม','err');return;}

  // Collect SOP steps
  const checks=document.querySelectorAll('.sop-chk input[type=checkbox]');
  const steps=[];
  checks.forEach(c=>{steps.push({name:c.dataset.name, skip:!c.checked});});

  document.getElementById('fa_save').textContent='⏳...';
  document.getElementById('fa_save').disabled=true;
  const res=await api({action:'addActivity',data:JSON.stringify({projectCode:isOther?'งานอื่นๆ':projCode,projectName:projName,type,name,deadline:dl,note,steps})});
  if(res.success){toast(res.message,'ok');closeM();await load();}
  else toast(res.error||'เกิดข้อผิดพลาด','err');
}

// REPORT — 3 กลุ่ม: ประสิทธิภาพ / ภาระงาน / ผลงานรวม
// ============================================================
function renderReport(){
  const now=new Date();
  const curY=now.getFullYear().toString();
  const MN=['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

  let h=`<div class="tb">
    <select class="fs" id="ry" onchange="renderReport()"></select>
    <select class="fs" id="rm" onchange="renderReport()"><option value="">ทุกเดือน</option>
      <option value="01">ม.ค.</option><option value="02">ก.พ.</option><option value="03">มี.ค.</option><option value="04">เม.ย.</option><option value="05">พ.ค.</option><option value="06">มิ.ย.</option>
      <option value="07">ก.ค.</option><option value="08">ส.ค.</option><option value="09">ก.ย.</option><option value="10">ต.ค.</option><option value="11">พ.ย.</option><option value="12">ธ.ค.</option>
    </select>
  </div>`;

  const ry=(document.getElementById('ry')||{}).value||curY;
  const rm=(document.getElementById('rm')||{}).value||'';

  // ============================================================
  // คำนวณข้อมูลทั้งหมด
  // ============================================================
  let doneSteps=0;
  const completedActs=[];
  const pendingActs=[];
  const overdueActs=[];
  const byType={};
  const byProj={};
  const avgDaysByType={};
  const bottleneckSteps={};
  const monthlyDone={};
  const monthlyCreated={};

  D.forEach(a=>{
    const steps=a.steps||[];
    const ds=steps.filter(s=>s['สถานะ']==='เสร็จ').length;
    const ts=steps.length;
    const allDone=ts>0&&ds===ts;
    const type=a['ประเภทกิจกรรม']||'ไม่ระบุ';

    // --- นับกิจกรรมที่สร้างตามเดือน ---
    if(a['สร้างเมื่อ']){
      const cym=String(a['สร้างเมื่อ']).substring(0,7);
      if(cym.length===7) monthlyCreated[cym]=(monthlyCreated[cym]||0)+1;
    }

    // --- ผลงานรวม: นับกิจกรรมเสร็จตามเดือน ---
    if(allDone){
      const lastDone=steps.filter(s=>s['วันที่เสร็จ']).map(s=>s['วันที่เสร็จ']).sort().pop();
      if(lastDone){
        const ym=lastDone.substring(0,7);
        if(!ry||lastDone.startsWith(ry)){
          if(!rm||lastDone.substring(5,7)===rm) completedActs.push(a);
        }
        if(lastDone.startsWith(ry)){
          monthlyDone[ym]=(monthlyDone[ym]||0)+1;
        }
      }
    }

    // --- ประสิทธิภาพ: ระยะเวลาเฉลี่ย ---
    if(allDone && a['สร้างเมื่อ']){
      const lastDone=steps.filter(s=>s['วันที่เสร็จ']).map(s=>s['วันที่เสร็จ']).sort().pop();
      if(lastDone){
        const start=new Date(String(a['สร้างเมื่อ']).substring(0,10));
        const end=new Date(lastDone);
        const days=Math.max(1,Math.ceil((end-start)/864e5));
        if(!avgDaysByType[type])avgDaysByType[type]={total:0,count:0};
        avgDaysByType[type].total+=days;
        avgDaysByType[type].count++;
      }
    }

    // --- ประสิทธิภาพ: ขั้นตอนคอขวด (ขั้นตอนที่ค้างนานสุด) ---
    steps.forEach(s=>{
      if(s['สถานะ']==='เสร็จ'&&s['วันที่เสร็จ']){
        // หาว่าขั้นตอนนี้ใช้เวลากี่วัน (จากวันที่ขั้นตอนก่อนเสร็จ หรือวันสร้าง)
        const stepIdx=steps.indexOf(s);
        let prevDate=a['สร้างเมื่อ']?String(a['สร้างเมื่อ']).substring(0,10):null;
        if(stepIdx>0&&steps[stepIdx-1]['วันที่เสร็จ'])prevDate=steps[stepIdx-1]['วันที่เสร็จ'];
        if(prevDate){
          const d1=new Date(prevDate),d2=new Date(s['วันที่เสร็จ']);
          const days=Math.max(0,Math.ceil((d2-d1)/864e5));
          const key=s['ชื่อขั้นตอน']||'ไม่ระบุ';
          if(!bottleneckSteps[key])bottleneckSteps[key]={total:0,count:0,max:0};
          bottleneckSteps[key].total+=days;
          bottleneckSteps[key].count++;
          bottleneckSteps[key].max=Math.max(bottleneckSteps[key].max,days);
        }
      }
    });

    // --- นับขั้นตอนเสร็จ ---
    steps.forEach(s=>{
      const d=s['วันที่เสร็จ']||'';
      if(!d||s['สถานะ']!=='เสร็จ')return;
      if(ry&&!d.startsWith(ry))return;
      if(rm&&d.substring(5,7)!==rm)return;
      doneSteps++;
      byType[type]=(byType[type]||0)+1;
      byProj[piLabel(a['รหัสโครงการ'])]=(byProj[piLabel(a['รหัสโครงการ'])]||0)+1;
    });

    // --- ภาระงาน: งานค้าง + เกินกำหนด ---
    if(!allDone){
      pendingActs.push(a);
      if(a.deadline){
        const diff=Math.ceil((new Date(a.deadline)-now)/864e5);
        if(diff<0)overdueActs.push({...a,overdueDays:Math.abs(diff)});
      }
    }
  });

  overdueActs.sort((a,b)=>b.overdueDays-a.overdueDays);

  // ============================================================
  // กลุ่ม 1: ประสิทธิภาพการทำงาน
  // ============================================================
  h+=`<div class="cd"><h3 style="font-size:14px;font-weight:600;color:var(--navy);margin-bottom:12px">⚡ ประสิทธิภาพการทำงาน</h3>`;

  // Tab toggle
  h+=`<div style="display:flex;gap:2px;background:#F3F4F6;border-radius:8px;padding:2px;margin-bottom:14px;width:fit-content">
    <button class="b bs" id="tab-main" style="background:var(--teal);color:#fff" onclick="document.getElementById('rpt-main').style.display='block';document.getElementById('rpt-step').style.display='none';this.style.background='var(--teal)';this.style.color='#fff';document.getElementById('tab-step').style.background='transparent';document.getElementById('tab-step').style.color='var(--text2)'">กิจกรรมหลัก</button>
    <button class="b bs" id="tab-step" style="background:transparent;color:var(--text2)" onclick="document.getElementById('rpt-step').style.display='block';document.getElementById('rpt-main').style.display='none';this.style.background='var(--teal)';this.style.color='#fff';document.getElementById('tab-main').style.background='transparent';document.getElementById('tab-main').style.color='var(--text2)'">ขั้นตอนย่อย</button>
  </div>`;

  // === TAB: กิจกรรมหลัก ===
  const avgEntries=Object.entries(avgDaysByType).map(([k,v])=>({type:k,avg:Math.round(v.total/v.count),count:v.count})).sort((a,b)=>b.avg-a.avg);
  h+=`<div id="rpt-main">`;
  h+=`<p style="font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:500">ระยะเวลาเฉลี่ยทั้งกระบวนการ ตั้งแต่รับเรื่อง → เสร็จสิ้น (วัน)</p>`;
  if(avgEntries.length){
    const maxAvg=Math.max(...avgEntries.map(e=>e.avg),1);
    avgEntries.forEach(e=>{
      const col=e.avg>30?'#DC2626':e.avg>14?'#E6961A':'#14938C';
      h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:12px">
        <span style="min-width:160px;color:var(--text2)">${e.type}</span>
        <div style="flex:1;height:18px;background:rgba(0,0,0,.04);border-radius:4px;overflow:hidden">
          <div style="width:${e.avg/maxAvg*100}%;height:100%;background:${col};border-radius:4px;display:flex;align-items:center;padding-left:6px;font-size:10px;color:#fff;font-weight:600">${e.avg} วัน</div>
        </div>
        <span style="min-width:60px;text-align:right;color:var(--muted);font-size:10px">(${e.count} งาน)</span>
      </div>`;
    });

    // เพิ่มตารางรายละเอียด
    h+=`<div style="overflow-x:auto;margin-top:12px"><table><thead><tr><th>ประเภท</th><th>เฉลี่ย (วัน)</th><th>เร็วสุด</th><th>นานสุด</th><th>จำนวน</th></tr></thead><tbody>`;
    // คำนวณ min/max ต่อประเภท
    const detailByType={};
    D.forEach(a=>{
      const steps=a.steps||[];
      const allDone=steps.length>0&&steps.filter(s=>s['สถานะ']==='เสร็จ').length===steps.length;
      if(!allDone||!a['สร้างเมื่อ'])return;
      const type=a['ประเภทกิจกรรม']||'ไม่ระบุ';
      const lastDone=steps.filter(s=>s['วันที่เสร็จ']).map(s=>s['วันที่เสร็จ']).sort().pop();
      if(!lastDone)return;
      const days=Math.max(1,Math.ceil((new Date(lastDone)-new Date(String(a['สร้างเมื่อ']).substring(0,10)))/864e5));
      if(!detailByType[type])detailByType[type]={min:999,max:0,total:0,count:0};
      detailByType[type].min=Math.min(detailByType[type].min,days);
      detailByType[type].max=Math.max(detailByType[type].max,days);
      detailByType[type].total+=days;
      detailByType[type].count++;
    });
    Object.entries(detailByType).sort((a,b)=>Math.round(b[1].total/b[1].count)-Math.round(a[1].total/a[1].count)).forEach(([k,v])=>{
      const avg=Math.round(v.total/v.count);
      const col=avg>30?'#DC2626':avg>14?'#E6961A':'#14938C';
      h+=`<tr><td style="font-size:12px">${k}</td><td style="font-weight:600;color:${col}">${avg}</td><td style="color:#14938C">${v.min}</td><td style="color:#DC2626">${v.max}</td><td style="color:var(--muted)">${v.count}</td></tr>`;
    });
    h+=`</tbody></table></div>`;
  } else { h+=`<p style="font-size:11px;color:var(--muted)">ยังไม่มีข้อมูล (ต้องมีกิจกรรมที่เสร็จสมบูรณ์แล้ว)</p>`; }
  h+=`</div>`;

  // === TAB: ขั้นตอนย่อย ===
  h+=`<div id="rpt-step" style="display:none">`;
  h+=`<p style="font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:500">ขั้นตอนที่ใช้เวลามากที่สุด — คอขวด (วัน)</p>`;
  const bnEntries=Object.entries(bottleneckSteps).map(([k,v])=>({step:k,avg:Math.round(v.total/v.count),max:v.max,count:v.count})).sort((a,b)=>b.avg-a.avg).slice(0,8);
  if(bnEntries.length){
    h+=`<div style="overflow-x:auto"><table><thead><tr><th>ขั้นตอน</th><th>เฉลี่ย (วัน)</th><th>นานสุด (วัน)</th><th>จำนวนครั้ง</th></tr></thead><tbody>`;
    bnEntries.forEach(e=>{
      const col=e.avg>7?'#DC2626':e.avg>3?'#E6961A':'#14938C';
      h+=`<tr><td style="font-size:12px">${e.step}</td><td style="font-weight:600;color:${col}">${e.avg}</td><td style="color:var(--muted)">${e.max}</td><td style="color:var(--muted)">${e.count}</td></tr>`;
    });
    h+=`</tbody></table></div>`;
  } else { h+=`<p style="font-size:11px;color:var(--muted)">ยังไม่มีข้อมูล</p>`; }
  h+=`</div>`; // close rpt-step
  h+=`</div>`; // close cd card

  // ============================================================
  // กลุ่ม 2: ภาระงานปัจจุบัน
  // ============================================================
  h+=`<div class="cd"><h3 style="font-size:14px;font-weight:600;color:var(--navy);margin-bottom:12px">📋 ภาระงานปัจจุบัน</h3>`;

  // Stat cards
  const pendByType={};
  pendingActs.forEach(a=>{const t=a['ประเภทกิจกรรม']||'ไม่ระบุ';pendByType[t]=(pendByType[t]||0)+1;});

  h+=`<div class="sg sg3" style="margin-bottom:14px">
    <div class="st"><div class="lb">งานค้างทั้งหมด</div><div class="vl" style="color:#E6961A">${pendingActs.length}</div></div>
    <div class="st"><div class="lb">เกินกำหนดแล้ว</div><div class="vl" style="color:#DC2626">${overdueActs.length}</div></div>
    <div class="st"><div class="lb">ยังไม่เกินกำหนด</div><div class="vl" style="color:#14938C">${pendingActs.length-overdueActs.length}</div></div>
  </div>`;

  // งานค้างแยกประเภท
  h+=`<p style="font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:500">งานค้างแยกตามประเภท</p>`;
  const pendTEntries=Object.entries(pendByType).sort((a,b)=>b[1]-a[1]);
  const maxPend=Math.max(...pendTEntries.map(e=>e[1]),1);
  pendTEntries.forEach(([k,v])=>{
    h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;font-size:12px">
      <span style="min-width:160px;color:var(--text2)">${k}</span>
      <div style="flex:1;height:16px;background:rgba(0,0,0,.04);border-radius:4px;overflow:hidden">
        <div style="width:${v/maxPend*100}%;height:100%;background:${tc(k)};border-radius:4px;display:flex;align-items:center;padding-left:6px;font-size:10px;color:#fff;font-weight:600">${v}</div>
      </div>
      <span style="min-width:30px;text-align:right;color:var(--text2);font-weight:600">${v}</span>
    </div>`;
  });

  // งานเกินกำหนด
  if(overdueActs.length){
    h+=`<p style="font-size:12px;color:#DC2626;margin:14px 0 8px;font-weight:600">⚠️ งานเกินกำหนด (${overdueActs.length} รายการ)</p>`;
    h+=`<div style="overflow-x:auto"><table><thead><tr><th>โครงการ</th><th>กิจกรรม</th><th>เกินกำหนด</th><th>ขั้นตอนค้าง</th></tr></thead><tbody>`;
    overdueActs.slice(0,10).forEach(a=>{
      const cur=(a.steps||[]).find(s=>s['สถานะ']==='รอ');
      h+=`<tr>
        <td><span class="pl" onclick="openDetail('${a.id}')">${piLabel(a['รหัสโครงการ'])}</span></td>
        <td style="font-size:11px">${a['ชื่อกิจกรรม']||''}</td>
        <td style="color:#DC2626;font-weight:600">${a.overdueDays} วัน</td>
        <td><span class="bdg" style="background:rgba(230,150,26,.1);color:#E6961A">${cur?cur['ชื่อขั้นตอน']:'—'}</span></td>
      </tr>`;
    });
    h+=`</tbody></table></div>`;
  }
  h+=`</div>`;

  // ============================================================
  // กลุ่ม 3: ผลงานรวม
  // ============================================================
  h+=`<div class="cd"><h3 style="font-size:14px;font-weight:600;color:var(--navy);margin-bottom:12px">📊 ผลงานรวม</h3>`;

  // Stat cards
  const projCount=new Set(D.map(a=>a['รหัสโครงการ']).filter(c=>c&&c!=='งานอื่นๆ')).size;
  h+=`<div class="sg sg4" style="margin-bottom:14px">
    <div class="st"><div class="lb">ขั้นตอนที่เสร็จ</div><div class="vl" style="color:#14938C">${doneSteps}</div></div>
    <div class="st"><div class="lb">กิจกรรมเสร็จสมบูรณ์</div><div class="vl" style="color:var(--teal)">${completedActs.length}</div></div>
    <div class="st"><div class="lb">กิจกรรมทั้งหมด</div><div class="vl" style="color:var(--navy)">${D.length}</div></div>
    <div class="st"><div class="lb">โครงการที่ดูแล</div><div class="vl" style="color:#8B5CF6">${projCount}</div></div>
  </div>`;

  // กราฟ trend รายเดือน — งานเข้ามา vs งานเสร็จ
  h+=`<p style="font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:500">ภาพรวมรายเดือน (ปี พ.ศ. ${+ry+543})</p>`;
  h+=`<div style="display:flex;gap:16px;margin-bottom:8px;font-size:11px">
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--orange)"></span>งานที่เข้ามา</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--emerald)"></span>งานที่เสร็จ</span>
  </div>`;
  const months=[];
  for(let m=1;m<=12;m++){
    const key=ry+'-'+(m<10?'0'+m:m);
    months.push({month:MN[m],created:monthlyCreated[key]||0,done:monthlyDone[key]||0});
  }
  const maxMon=Math.max(...months.map(m=>Math.max(m.created,m.done)),1);
  h+=`<div style="display:flex;align-items:flex-end;gap:3px;height:140px;margin-bottom:8px;padding:0 4px">`;
  months.forEach((m,i)=>{
    const pctC=m.created/maxMon*100;
    const pctD=m.done/maxMon*100;
    const isCur=(+ry===now.getFullYear()&&i+1===now.getMonth()+1);
    h+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;height:100%;justify-content:flex-end">
      <div style="display:flex;gap:1px;align-items:flex-end;width:100%;justify-content:center;height:calc(100% - 16px)">
        <div style="width:45%;max-width:18px;height:${Math.max(pctC,2)}%;background:var(--orange);border-radius:3px 3px 0 0;min-height:${m.created?'6':'2'}px;opacity:${m.created?1:.12};position:relative" title="เข้ามา ${m.created}">
          ${m.created?`<span style="position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:600;color:var(--orange)">${m.created}</span>`:''}
        </div>
        <div style="width:45%;max-width:18px;height:${Math.max(pctD,2)}%;background:var(--emerald);border-radius:3px 3px 0 0;min-height:${m.done?'6':'2'}px;opacity:${m.done?1:.12};position:relative" title="เสร็จ ${m.done}">
          ${m.done?`<span style="position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:600;color:var(--emerald)">${m.done}</span>`:''}
        </div>
      </div>
      <span style="font-size:9px;color:var(--muted);${isCur?'font-weight:700;color:var(--navy)':''}">${m.month}</span>
    </div>`;
  });
  h+=`</div>`;

  // สรุปเดือนที่ overload
  const overloadMonths=months.filter(m=>m.created>0).sort((a,b)=>b.created-a.created).slice(0,3);
  if(overloadMonths.length){
    h+=`<div style="background:rgba(230,150,26,.06);border:1px solid rgba(230,150,26,.15);border-radius:10px;padding:10px 14px;margin-bottom:14px">
      <p style="font-size:11px;font-weight:600;color:var(--orange);margin-bottom:4px">📈 เดือนที่งานเข้ามาเยอะสุด</p>`;
    overloadMonths.forEach(m=>{
      const ratio=m.done>0?Math.round(m.done/m.created*100):0;
      h+=`<div style="font-size:12px;color:var(--text2);padding:2px 0">
        <b>${m.month}</b> — เข้ามา <b style="color:var(--orange)">${m.created}</b> งาน / เสร็จ <b style="color:var(--emerald)">${m.done}</b> งาน
        <span style="font-size:10px;color:var(--muted)">(อัตราเสร็จ ${ratio}%)</span>
      </div>`;
    });
    h+=`</div>`;
  }

  // สรุปตามประเภท
  h+=`<p style="font-size:12px;color:var(--muted);margin:14px 0 8px;font-weight:500">ขั้นตอนเสร็จแยกตามประเภทกิจกรรม</p>`;
  const sortedT=Object.entries(byType).sort((a,b)=>b[1]-a[1]);
  const maxT=Math.max(...sortedT.map(s=>s[1]),1);
  sortedT.forEach(([k,v])=>{
    h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;font-size:12px">
      <span style="min-width:160px;color:var(--text2)">${k}</span>
      <div style="flex:1;height:16px;background:rgba(0,0,0,.04);border-radius:4px;overflow:hidden">
        <div style="width:${v/maxT*100}%;height:100%;background:${tc(k)};border-radius:4px;display:flex;align-items:center;padding-left:6px;font-size:10px;color:#fff;font-weight:600">${v}</div>
      </div>
      <span style="min-width:30px;text-align:right;color:var(--text2);font-weight:600">${v}</span>
    </div>`;
  });

  // สรุปตามโครงการ
  h+=`<p style="font-size:12px;color:var(--muted);margin:14px 0 8px;font-weight:500">ขั้นตอนเสร็จแยกตามโครงการ</p>`;
  const sortedP=Object.entries(byProj).sort((a,b)=>b[1]-a[1]);
  const maxP=Math.max(...sortedP.map(s=>s[1]),1);
  sortedP.forEach(([k,v])=>{
    h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;font-size:12px">
      <span style="min-width:180px;color:var(--text2);font-size:11px">${k}</span>
      <div style="flex:1;height:16px;background:rgba(0,0,0,.04);border-radius:4px;overflow:hidden">
        <div style="width:${v/maxP*100}%;height:100%;background:var(--teal);border-radius:4px;display:flex;align-items:center;padding-left:6px;font-size:10px;color:#fff;font-weight:600">${v}</div>
      </div>
      <span style="min-width:30px;text-align:right;color:var(--text2);font-weight:600">${v}</span>
    </div>`;
  });
  h+=`</div>`;

  document.getElementById('pg-report').innerHTML=h;

  // Set year selector
  const allYears=[...new Set(D.flatMap(a=>{
    const ys=[(a['สร้างเมื่อ']||'').substring(0,4)];
    (a.steps||[]).forEach(s=>ys.push((s['วันที่เสร็จ']||'').substring(0,4)));
    return ys;
  }).filter(Boolean))].sort().reverse();
  if(!allYears.length)allYears.push(curY);
  const ysel=document.getElementById('ry');
  if(ysel)ysel.innerHTML=allYears.map(y=>`<option value="${y}" ${y===ry?'selected':''}>${parseInt(y)+543}</option>`).join('');
}

// ============================================================
// PROJECT LOG — ดูกิจกรรมทั้งหมดของโครงการนั้น
// ============================================================
function openProjectLog(code){
  showPage('log');
  const proj=P.find(x=>x.code===code);
  const projActs=D.filter(a=>a['รหัสโครงการ']===code);
  const piName=proj?proj.pi:'';
  const projName=proj?proj.name:'';

  let totalSteps=0, doneSteps=0;
  projActs.forEach(a=>(a.steps||[]).forEach(s=>{totalSteps++;if(s['สถานะ']==='เสร็จ')doneSteps++;}));

  let h=`<span class="back-btn" onclick="showPage('dash')">← กลับ Dashboard</span>`;

  // Project header
  h+=`<div class="cd" style="padding:16px">
    <p style="font-size:10px;color:rgba(255,255,255,.55)">ประวัติกิจกรรมโครงการ</p>
    <h2 style="font-size:16px;font-weight:700;margin:4px 0">${code}</h2>
    ${piName?`<p style="font-size:12px;color:#00587E;margin-bottom:2px">หัวหน้า: ${piName}</p>`:''}
    ${projName?`<p style="font-size:11px;color:#94A3B8">${projName}</p>`:''}
    <div style="display:flex;gap:12px;margin-top:10px">
      <div style="font-size:11px"><span style="color:#64748B">กิจกรรมทั้งหมด:</span> <b style="color:#00587E">${projActs.length}</b></div>
      <div style="font-size:11px"><span style="color:#64748B">ขั้นตอนเสร็จ:</span> <b style="color:#22C55E">${doneSteps}/${totalSteps}</b></div>
    </div>
  </div>`;

  // Activity list for this project
  if(projActs.length===0){
    h+=`<div class="cd" style="text-align:center;color:#64748B;font-size:12px;padding:20px">ยังไม่มีกิจกรรม</div>`;
  } else {
    projActs.forEach(a=>{
      const steps=a.steps||[];
      const ds=steps.filter(s=>s['สถานะ']==='เสร็จ').length;
      const ts=steps.length;
      const allDone=ts>0&&ds===ts;
      const pct=ts?Math.round(ds/ts*100):0;
      const col=allDone?'#14938C':pct>=50?'#00587E':'#E6961A';
      const cur=steps.find(s=>s['สถานะ']==='รอ');

      h+=`<div class="cd" style="cursor:pointer" onclick="openDetail('${a.id}')">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px">
          <div>
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
              <span class="bdg" style="background:${tc(a['ประเภทกิจกรรม'])}20;color:${tc(a['ประเภทกิจกรรม'])}">${a['ประเภทกิจกรรม']||'-'}</span>
              <span style="font-size:13px;font-weight:600">${a['ชื่อกิจกรรม']||''}</span>
            </div>
            ${cur&&!allDone?`<p style="font-size:10px;color:#E6961A">ขั้นตอนถัดไป: ${cur['ชื่อขั้นตอน']}</p>`:''}
            ${allDone?`<p style="font-size:10px;color:#059669">✅ เสร็จสิ้นทุกขั้นตอน</p>`:''}
          </div>
          <div style="text-align:right">
            <div class="prog" style="min-width:100px"><div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${col}"></div></div><span class="prog-txt">${ds}/${ts}</span></div>
            ${a.deadline?`<p style="font-size:10px;color:rgba(255,255,255,.55);margin-top:4px">deadline: ${fmtD(a.deadline)}</p>`:''}
          </div>
        </div>
        ${steps.length?`<div style="display:flex;gap:3px;margin-top:8px;flex-wrap:wrap">${steps.map(s=>{
          const c=s['สถานะ']==='เสร็จ'?'#14938C':s['สถานะ']==='ข้าม'?'#475569':'#334155';
          return`<div style="width:${100/ts}%;max-width:40px;height:4px;background:${c};border-radius:2px" title="${s['ชื่อขั้นตอน']}: ${s['สถานะ']}"></div>`;
        }).join('')}</div>`:''}
      </div>`;
    });
  }

  document.getElementById('pg-log').innerHTML=h;
}

// ============================================================
// HELPERS
// ============================================================
function fmtD(d){if(!d)return'—';const p=String(d).substring(0,10).split('-');if(p.length!==3)return d;const M=['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];return`${+p[2]} ${M[+p[1]]} ${+p[0]+543}`;}
function closeM(){document.getElementById('modal').innerHTML='';}
function toast(m,t){const e=document.createElement('div');e.className='toast t-'+(t==='err'?'err':'ok');e.textContent=m;document.getElementById('toasts').appendChild(e);setTimeout(()=>e.remove(),2500);}

// Init
load();
</script>
</body>
</html>
