function parseCSV(text) {
  const lines = text.split("\n");
  if (lines.length < 2) return [];
  const data = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const row = []; let current = ""; let inQuote = false;
    for (let c of lines[i]) {
      if (c === '"') inQuote = !inQuote;
      else if (c === ',' && !inQuote) { row.push(current.trim()); current = ""; }
      else current += c;
    }
    row.push(current.trim());
    if (row.length < 10) continue;
    const get = (idx) => (idx < row.length ? row[idx] : "").replace(/^"|"$/g,"").trim();
    const num = (idx) => { const v = parseFloat(get(idx).replace(/,/g,"")); return isNaN(v)?null:v; };
    const code = get(1); if (!code) continue;
    data.push({ year:parseInt(get(0))||0, code, name:get(2).substring(0,80), title:get(3), pi:get(4), affil:get(5), contractor:get(6), program:get(7).substring(0,60), subplan:get(8).substring(0,60), totalBudget:num(9), yearBudget:num(10), duration:num(11), startDate:get(12)||null, endDate:get(13)||null, status:get(14)||"รอดำเนินการ", extendDate:get(15)||null, owner:get(16), remark:get(17)||null });
  }
  return data;
}

async function loadData() {
  if (GOOGLE_SHEETS_CSV_URL && GOOGLE_SHEETS_CSV_URL !== "YOUR_GOOGLE_SHEETS_CSV_URL") {
    try {
      const res = await fetch(GOOGLE_SHEETS_CSV_URL);
      const text = await res.text();
      const parsed = parseCSV(text);
      if (parsed.length > 0) { console.log("Loaded "+parsed.length+" rows from Google Sheets"); return parsed; }
    } catch(e) { console.warn("Fetch failed:",e); }
  }
  return FALLBACK_DATA;
}

  const saveOverrides = useCallback(async (newOverrides) => {
    setStatusOverrides(newOverrides);
    try {
      await Promise.resolve(localStorage.setItem("team-status-overrides", JSON.stringify(newOverrides)));
      setSaveMsg("บันทึกแล้ว");
      setTimeout(() => setSaveMsg(""), 2000);
    } catch (e) {
      setSaveMsg("บันทึกไม่สำเร็จ");
      setTimeout(() => setSaveMsg(""), 2000);
    }
  }, []);

  const handleStatusChange = useCallback((code, newStatus) => {
    const orig = DATA.find(d => d.code === code);
    const newO = { ...statusOverrides };
    if (orig && orig.status === newStatus) {
      delete newO[code];
    } else {
      newO[code] = newStatus;
    }
    saveOverrides(newO);
    setEditingCode(null);
  }, [statusOverrides, saveOverrides]);

  const resetAllOverrides = useCallback(() => {
    if (Object.keys(statusOverrides).length === 0) return;
    saveOverrides({});
  }, [statusOverrides, saveOverrides]);

  // Merge overrides into data
  const liveData = useMemo(() => {
    if (Object.keys(statusOverrides).length === 0) return DATA;
    return DATA.map(d => statusOverrides[d.code] ? { ...d, status: statusOverrides[d.code] } : d);
  }, [statusOverrides]);

  const filtered = useMemo(() => {
    return liveData.filter(d => {
      if (fOwner !== "all" && d.owner !== fOwner) return false;
      if (fYear !== "all" && d.year !== parseInt(fYear)) return false;
      if (fGroup !== "all" && si(d.status).g !== fGroup) return false;
      if (search) {
        const q = search.toLowerCase();
        return (d.name?.toLowerCase().includes(q) || d.pi?.toLowerCase().includes(q) || d.code?.toLowerCase().includes(q) || d.contractor?.toLowerCase().includes(q));
      }
      return true;
    });
  }, [liveData, fOwner, fYear, fGroup, search]);

  const sorted = useMemo(() => {
    if (!sortCol) return filtered;
    return [...filtered].sort((a, b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (va == null) return 1;
      if (vb == null) return -1;
      if (typeof va === "number") return sortDir === "asc" ? va - vb : vb - va;
      return sortDir === "asc" ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
    });
  }, [filtered, sortCol, sortDir]);

  const handleSort = (col) => {
    if (sortCol === col) setSortDir(d => d === "asc" ? "desc" : "asc");
    else { setSortCol(col); setSortDir("asc"); }
  };

  const stats = useMemo(() => {
    const total = filtered.length;
    const totalBudget = filtered.reduce((s, d) => s + (d.totalBudget || 0), 0);
    const groups = {};
    const groupBudgets = {};
    filtered.forEach(d => {
      const g = si(d.status).g;
      groups[g] = (groups[g] || 0) + 1;
      groupBudgets[g] = (groupBudgets[g] || 0) + (d.totalBudget || 0);
    });

    const ownerData = TEAM.map(t => ({ name: t, count: filtered.filter(d => d.owner === t).length, color: TC[t] }));
    
    const years = [...new Set(liveData.map(d => d.year))].sort();
    const yearData = years.map(y => {
      const row = { year: "ปี " + y };
      TEAM.forEach(t => {
        row[t] = filtered.filter(d => d.year === y && d.owner === t).length;
        // "ยังไม่ปิด" = ไม่รวม closed (ปิดโครงการ) และ terminated (ยุติ/ยกเลิก) เพราะถือว่าเสร็จสิ้นกระบวนการแล้ว
        row[t + "_open"] = filtered.filter(d => d.year === y && d.owner === t && !["closed","terminated"].includes(si(d.status).g)).length;
      });
      return row;
    });

    // Paired data
    const yearPersonData = years.map(y => {
      const pairs = [];
      TEAM.forEach(t => {
        const all = filtered.filter(d => d.year === y && d.owner === t).length;
        const open = filtered.filter(d => d.year === y && d.owner === t && !["closed","terminated"].includes(si(d.status).g)).length;
        pairs.push({ label: t, all, open, color: TC[t] });
      });
      return { year: y, yearLabel: "ปี " + y, pairs };
    });

    const statusAgg = {};
    filtered.forEach(d => {
      const info = si(d.status);
      const key = info.l;
      if (!statusAgg[key]) statusAgg[key] = { count: 0, color: info.c, budget: 0 };
      statusAgg[key].count++;
      statusAgg[key].budget += d.totalBudget || 0;
    });
    const statusDataRaw = Object.entries(statusAgg).map(([name, v]) => ({ name, value: v.count, color: v.color, budget: v.budget }));
    // Sort: flow = ตามขั้นตอน, count = ตามจำนวนมาก→น้อย
    const statusData = statusSort === "flow"
      ? statusDataRaw.sort((a, b) => {
          const ia = STATUS_FLOW_ORDER.indexOf(a.name);
          const ib = STATUS_FLOW_ORDER.indexOf(b.name);
          return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
        })
      : statusDataRaw.sort((a, b) => b.value - a.value);

    const budgetByOwner = TEAM.map(t => ({
      name: t,
      budget: filtered.filter(d => d.owner === t).reduce((s, d) => s + (d.totalBudget || 0), 0),
      color: TC[t]
    }));

    return { total, totalBudget, groups, groupBudgets, ownerData, yearData, yearPersonData, statusData, budgetByOwner };
  }, [filtered, statusSort]);

  const years = [...new Set(liveData.map(d => d.year))].sort();

  const fb = (active, accent) => ({
    padding: "6px 14px", borderRadius: 6,
    border: active ? "1.5px solid " + (accent || "#3B82F6") : "1.5px solid #334155",
    background: active ? (accent || "#3B82F6") + "20" : "transparent",
    color: active ? (accent || "#93C5FD") : "#94A3B8",
    cursor: "pointer", fontSize: 12, fontWeight: active ? 600 : 400, transition: "all 0.15s",
  });

  return (
    <div style={{ minHeight: "100vh", background: "#0F172A", color: "#E2E8F0", fontFamily: "'Noto Sans Thai', sans-serif" }}>
      <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
      
      {/* Header + Filters - Sticky */}
      <div style={{ position: "sticky", top: 0, zIndex: 50, background: "#0F172A", borderBottom: "1px solid #1E293B" }}>
        <div style={{ maxWidth: 1400, margin: "0 auto", padding: "12px 28px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8, marginBottom: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <h1 style={{ fontSize: 20, fontWeight: 700, margin: 0, background: "linear-gradient(90deg, #60A5FA, #A78BFA)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>
                Team Dashboard
              </h1>
              <span style={{ color: "#475569", fontSize: 11 }}>บพค. ปี 2564-2569</span>
            </div>
            <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
              {[["overview","ภาพรวม"],["table","ตารางข้อมูล"]].map(([k,v]) => (
                <button key={k} onClick={() => setTab(k)} style={{ padding: "6px 16px", borderRadius: 6, border: "none", cursor: "pointer", fontSize: 13, fontWeight: tab === k ? 700 : 500, background: tab === k ? "#3B82F6" : "transparent", color: tab === k ? "#fff" : "#94A3B8" }}>{v}</button>
              ))}
            </div>
          </div>
          {/* Filters row */}
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
            <span style={{ fontSize: 10, color: "#475569", fontWeight: 700, letterSpacing: 1 }}>FILTER</span>
            <div style={{ display: "flex", gap: 4 }}>
              <button onClick={() => setFOwner("all")} style={fb(fOwner === "all")}>ทุกคน</button>
              {TEAM.map(t => <button key={t} onClick={() => setFOwner(fOwner === t ? "all" : t)} style={fb(fOwner === t, TC[t])}>{t}</button>)}
            </div>
            <div style={{ width: 1, height: 20, background: "#334155" }} />
            <div style={{ display: "flex", gap: 4 }}>
              <button onClick={() => setFYear("all")} style={fb(fYear === "all")}>ทุกปี</button>
              {years.map(y => <button key={y} onClick={() => setFYear(fYear === String(y) ? "all" : String(y))} style={fb(fYear === String(y))}>{y}</button>)}
            </div>
            <div style={{ width: 1, height: 20, background: "#334155" }} />
            <div style={{ display: "flex", gap: 4 }}>
              <button onClick={() => setFGroup("all")} style={fb(fGroup === "all")}>ทุกสถานะ</button>
              {Object.entries(GROUP_LABELS).map(([k, v]) => (
                <button key={k} onClick={() => setFGroup(fGroup === k ? "all" : k)} style={fb(fGroup === k, v.color)}>{v.label}</button>
              ))}
            </div>
            <input type="text" placeholder="ค้นหา..." value={search} onChange={e => setSearch(e.target.value)}
              style={{ marginLeft: "auto", padding: "6px 12px", borderRadius: 6, border: "1.5px solid #334155", background: "#1E293B", color: "#E2E8F0", fontSize: 12, width: 220, outline: "none" }} />
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 1400, margin: "0 auto", padding: "16px 28px" }}>

        {tab === "overview" && (<>
          {/* KPI Cards */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 14, marginBottom: 20 }}>
            {[
              { label: "โครงการทั้งหมด", value: stats.total, budget: stats.totalBudget, accent: "#3B82F6" },
              { label: "กำลังดำเนินการ", value: (stats.groups.active || 0) + (stats.groups.pending || 0), budget: (stats.groupBudgets.active || 0) + (stats.groupBudgets.pending || 0), accent: "#06B6D4" },
              { label: "รอปิดโครงการ", value: stats.groups.closing || 0, budget: stats.groupBudgets.closing || 0, accent: "#22C55E" },
              { label: "ปิดแล้ว", value: stats.groups.closed || 0, budget: stats.groupBudgets.closed || 0, accent: "#64748B" },
              { label: "ยุติ/ยกเลิก", value: (stats.groups.terminated || 0), budget: (stats.groupBudgets.terminated || 0), accent: "#DC2626" },
            ].map((kpi, i) => (
              <div key={i} style={{ background: "#1E293B", borderRadius: 12, padding: "18px 20px", border: "1px solid #334155", borderLeft: "4px solid " + kpi.accent }}>
                <p style={{ fontSize: 11, color: "#64748B", margin: 0, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>{kpi.label}</p>
                <p style={{ fontSize: 28, fontWeight: 700, margin: "6px 0 0", color: kpi.accent }}>{kpi.value} <span style={{ fontSize: 13, fontWeight: 500, color: "#94A3B8" }}>โครงการ</span></p>
                <p style={{ fontSize: 13, color: "#F59E0B", margin: "4px 0 0", fontWeight: 600 }}>{fmtB(kpi.budget)} <span style={{ fontSize: 10, fontWeight: 400, color: "#64748B" }}>บาท</span></p>
              </div>
            ))}
          </div>

          {/* Charts Row 1 */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 14 }}>
            <div style={{ background: "#1E293B", borderRadius: 12, padding: 20, border: "1px solid #334155" }}>
              <h3 style={{ fontSize: 14, fontWeight: 600, margin: "0 0 14px", color: "#CBD5E1" }}>จำนวนโครงการรายบุคคล</h3>
              <ResponsiveContainer width="100%" height={230}>
                <BarChart data={stats.ownerData} barSize={38} margin={{ top: 20 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#1E293B" />
                  <XAxis dataKey="name" tick={{ fill: "#94A3B8", fontSize: 13 }} axisLine={false} />
                  <YAxis tick={{ fill: "#64748B", fontSize: 11 }} axisLine={false} />
                  <Tooltip content={<Tip />} cursor={{ fill: "rgba(255,255,255,0.05)" }} />
                  <Bar dataKey="count" name="จำนวน" radius={[6,6,0,0]}>
                    {stats.ownerData.map((e, i) => <Cell key={i} fill={e.color} />)}
                    <LabelList content={({x, y, width, height, value, index}) => {
                      const v = value ?? 0;
                      if (v === 0) return <text x={x + width / 2} y={y - 4} fill="#F59E0B" fontSize={10} fontWeight={600} textAnchor="middle">0</text>;
                      return <text x={x + width / 2} y={y + 18} fill="#fff" fontSize={14} fontWeight={800} textAnchor="middle">{v}</text>;
                    }} />
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </div>
            <div style={{ background: "#1E293B", borderRadius: 12, padding: 20, border: "1px solid #334155" }}>
              <h3 style={{ fontSize: 14, fontWeight: 600, margin: "0 0 14px", color: "#CBD5E1" }}>งบประมาณรวมรายบุคคล</h3>
              <ResponsiveContainer width="100%" height={230}>
                <BarChart data={stats.budgetByOwner} barSize={36} layout="vertical" margin={{ right: 80 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#1E293B" horizontal={false} />
                  <XAxis type="number" tick={{ fill: "#64748B", fontSize: 10 }} axisLine={false} tickFormatter={v => fmtB(v)} />
                  <YAxis type="category" dataKey="name" tick={{ fill: "#94A3B8", fontSize: 13 }} axisLine={false} width={55} />
                  <Tooltip content={<Tip />} formatter={v => fmtBFull(v)} cursor={{ fill: "rgba(255,255,255,0.05)" }} />
                  <Bar dataKey="budget" name="งบประมาณ" radius={[0,6,6,0]}>
                    {stats.budgetByOwner.map((e, i) => <Cell key={i} fill={e.color} />)}
                    <LabelList content={({x, y, width, height, index}) => {
                      const d = stats.budgetByOwner[index];
                      if (!d) return null;
                      const v = d.budget || 0;
                      if (v === 0) return <text x={x + width + 6} y={y + height / 2} dy={4} fill="#F59E0B" fontSize={10} fontWeight={600}>0</text>;
                      const maxBudget = Math.max(...stats.budgetByOwner.map(b => b.budget));
                      const isLong = v > maxBudget * 0.6;
                      return isLong
                        ? <text x={x + width - 8} y={y + height / 2} dy={4} fill="#fff" fontSize={11} fontWeight={700} textAnchor="end">{fmtB(v)}</text>
                        : <text x={x + width + 6} y={y + height / 2} dy={4} fill="#E2E8F0" fontSize={11} fontWeight={600}>{fmtB(v)}</text>;
                    }} />
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </div>
          </div>

          {/* Status Chart - Full Width */}
          <div style={{ background: "#1E293B", borderRadius: 12, padding: 20, border: "1px solid #334155", marginBottom: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
              <h3 style={{ fontSize: 14, fontWeight: 600, margin: 0, color: "#CBD5E1" }}>สถานะโครงการ — จำนวน + งบประมาณรวม</h3>
              <div style={{ display: "flex", gap: 4 }}>
                <button onClick={() => setStatusSort("flow")} style={{
                  padding: "5px 12px", borderRadius: 6, fontSize: 11, fontWeight: 600, cursor: "pointer",
                  border: statusSort === "flow" ? "1.5px solid #3B82F6" : "1.5px solid #334155",
                  background: statusSort === "flow" ? "#3B82F620" : "transparent",
                  color: statusSort === "flow" ? "#60A5FA" : "#94A3B8"
                }}>เรียงตามขั้นตอน</button>
                <button onClick={() => setStatusSort("count")} style={{
                  padding: "5px 12px", borderRadius: 6, fontSize: 11, fontWeight: 600, cursor: "pointer",
                  border: statusSort === "count" ? "1.5px solid #F59E0B" : "1.5px solid #334155",
                  background: statusSort === "count" ? "#F59E0B20" : "transparent",
                  color: statusSort === "count" ? "#F59E0B" : "#94A3B8"
                }}>เรียงตามจำนวน</button>
              </div>
            </div>
            <ResponsiveContainer width="100%" height={Math.max(320, stats.statusData.length * 40 + 40)}>
              <BarChart data={stats.statusData} layout="vertical" barSize={20} margin={{ left: 20, right: 200 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#1E293B" horizontal={false} />
                <XAxis type="number" tick={{ fill: "#64748B", fontSize: 10 }} axisLine={false} />
                <YAxis type="category" dataKey="name" tick={{ fill: "#CBD5E1", fontSize: 10 }} axisLine={false} width={200} />
                <Tooltip content={<Tip />} cursor={{ fill: "rgba(255,255,255,0.05)" }} />
                <Bar dataKey="value" name="จำนวนโครงการ" radius={[0,4,4,0]}>
                  {stats.statusData.map((e, i) => <Cell key={i} fill={e.color} />)}
                  <LabelList content={({x, y, width, height, index}) => {
                    const d = stats.statusData[index];
                    if (!d) return null;
                    const v = d.value ?? 0;
                    if (v === 0) return <text x={x + width + 8} y={y + height / 2} dy={4} fill="#F59E0B" fontSize={10} fontWeight={600}>0 โครงการ · งบ 0</text>;
                    const maxVal = Math.max(...stats.statusData.map(s => s.value));
                    const txt = `${v} โครงการ · งบ ${fmtB(d.budget)}`;
                    const isLong = v > maxVal * 0.35;
                    return isLong
                      ? <text x={x + width - 8} y={y + height / 2} dy={4} fill="#fff" fontSize={10} fontWeight={700} textAnchor="end">{txt}</text>
                      : <text x={x + width + 8} y={y + height / 2} dy={4} fill="#CBD5E1" fontSize={10} fontWeight={600}>{txt}</text>;
                  }} />
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>

          {/* Charts Row 2 - Year breakdown full width */}
          <div style={{ background: "#1E293B", borderRadius: 12, padding: 20, border: "1px solid #334155", marginBottom: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
              <h3 style={{ fontSize: 14, fontWeight: 600, margin: 0, color: "#CBD5E1" }}>โครงการรายปี × ผู้รับผิดชอบ</h3>
              <button onClick={() => setShowCompare(!showCompare)} style={{
                padding: "6px 14px", borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: "pointer", transition: "all 0.15s",
                border: showCompare ? "1.5px solid #F59E0B" : "1.5px solid #334155",
                background: showCompare ? "#F59E0B20" : "transparent",
                color: showCompare ? "#F59E0B" : "#94A3B8"
              }}>
                {showCompare ? "ซ่อนเปรียบเทียบ" : "เปรียบเทียบ: ทั้งหมด vs ยังไม่ปิด"}
              </button>
            </div>

            {showCompare && (
              <div style={{ display: "flex", gap: 12, marginBottom: 8, fontSize: 11, color: "#94A3B8", alignItems: "center" }}>
                {TEAM.map(t => <span key={t} style={{ display: "flex", alignItems: "center", gap: 3 }}>
                  <span style={{ width: 8, height: 8, background: TC[t], borderRadius: 2 }} />
                  <span style={{ color: TC[t], fontWeight: 600 }}>{t}</span>
                </span>)}
                <span style={{ color: "#475569" }}>|</span>
                <span>แท่งทึบ = ทั้งหมด, แท่งจาง+เส้นประ = ยังไม่ปิด</span>
              </div>
            )}

            <ResponsiveContainer width="100%" height={showCompare ? 380 : 320}>
              <BarChart data={stats.yearData} barCategoryGap="18%" margin={{ top: 24 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#1E293B" />
                <XAxis dataKey="year" tick={{ fill: "#94A3B8", fontSize: 12 }} axisLine={false} />
                <YAxis tick={{ fill: "#64748B", fontSize: 11 }} axisLine={false} />
                <Tooltip cursor={{ fill: "rgba(255,255,255,0.05)" }} content={({ active, payload, label }) => {
                  if (!active || !payload?.length) return null;
                  const entry = stats.yearData.find(r => r.year === label);
                  return (
                    <div style={{ background: "#1E293B", border: "1px solid #334155", borderRadius: 8, padding: "10px 14px", color: "#F1F5F9", fontSize: 12 }}>
                      <p style={{ fontWeight: 600, marginBottom: 6 }}>{label}</p>
                      {TEAM.map(t => {
                        const all = entry?.[t] ?? 0;
                        const open = entry?.[t + "_open"] ?? 0;
                        return <p key={t} style={{ color: TC[t], margin: "2px 0", fontWeight: 600 }}>
                          {t}: {showCompare ? `${all} / ${open}` : all}
                        </p>;
                      })}
                    </div>
                  );
                }} />
                {!showCompare && <Legend wrapperStyle={{ fontSize: 11 }} />}
                {/* For each team member: solid bar (all), then if compare: dashed bar (open) right next to it */}
                {TEAM.flatMap(t => {
                  const bars = [
                    <Bar key={t} dataKey={t} name={showCompare ? undefined : t} fill={TC[t]} radius={[4,4,0,0]} barSize={showCompare ? 7 : 14} legendType={showCompare ? "none" : "rect"}>
                      <LabelList content={({x, y, width, value}) => {
                        const v = value ?? 0;
                        return <text x={x + width / 2} y={y - 4} fill={v === 0 ? "#F59E0B" : TC[t]} fontSize={v === 0 ? 8 : (showCompare ? 9 : 11)} fontWeight={800} textAnchor="middle">{v}</text>;
                      }} />
                    </Bar>
                  ];
                  if (showCompare) {
                    bars.push(
                      <Bar key={t+"_open"} dataKey={t + "_open"} name={undefined} fill={TC[t]} fillOpacity={0.25} stroke={TC[t]} strokeWidth={1} strokeDasharray="4 2" radius={[4,4,0,0]} barSize={7} legendType="none">
                        <LabelList content={({x, y, width, value}) => {
                          const v = value ?? 0;
                          return <text x={x + width / 2} y={y - 4} fill={v === 0 ? "#F59E0B" : TC[t]} fontSize={v === 0 ? 7 : 9} fontWeight={700} textAnchor="middle" opacity={0.8}>{v}</text>;
                        }} />
                      </Bar>
                    );
                  }
                  return bars;
                })}
              </BarChart>
            </ResponsiveContainer>
          </div>

          {/* Team Cards */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 12, marginBottom: 20 }}>
            {TEAM.map(t => {
              const md = filtered.filter(d => d.owner === t);
              const active = md.filter(d => ["active","pending"].includes(si(d.status).g)).length;
              const closing = md.filter(d => si(d.status).g === "closing").length;
              const closed = md.filter(d => si(d.status).g === "closed").length;
              const terminated = md.filter(d => si(d.status).g === "terminated").length;
              const budgetAll = md.reduce((s, d) => s + (d.totalBudget || 0), 0);
              const budgetActive = md.filter(d => ["active","pending"].includes(si(d.status).g)).reduce((s, d) => s + (d.totalBudget || 0), 0);
              const budgetClosing = md.filter(d => si(d.status).g === "closing").reduce((s, d) => s + (d.totalBudget || 0), 0);
              const budgetClosed = md.filter(d => si(d.status).g === "closed").reduce((s, d) => s + (d.totalBudget || 0), 0);
              return (
                <div key={t} onClick={() => setFOwner(fOwner === t ? "all" : t)}
                  style={{ background: fOwner === t ? TC[t] + "15" : "#1E293B", borderRadius: 12, padding: 14,
                    border: "1.5px solid " + (fOwner === t ? TC[t] : "#334155"), cursor: "pointer", transition: "all 0.2s" }}>
                  {/* Header: name + total */}
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                    <div style={{ width: 28, height: 28, borderRadius: "50%", background: TC[t] + "30", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 12, color: TC[t] }}>{t[0]}</div>
                    <span style={{ fontWeight: 600, fontSize: 14, color: TC[t] }}>{t}</span>
                    <span style={{ marginLeft: "auto", fontSize: 22, fontWeight: 800, color: "#E2E8F0" }}>{md.length}</span>
                  </div>
                  {/* Status counts row */}
                  <div style={{ display: "flex", gap: 4, fontSize: 10, marginBottom: 8, flexWrap: "wrap" }}>
                    <span style={{ padding: "2px 6px", borderRadius: 4, background: "#06B6D422", color: "#06B6D4" }}>ดำเนิน {active}</span>
                    <span style={{ padding: "2px 6px", borderRadius: 4, background: "#22C55E22", color: "#22C55E" }}>รอปิด {closing}</span>
                    <span style={{ padding: "2px 6px", borderRadius: 4, background: "#64748B22", color: "#94A3B8" }}>ปิด {closed}</span>
                    {terminated > 0 && <span style={{ padding: "2px 6px", borderRadius: 4, background: "#DC262622", color: "#DC2626" }}>ยุติ {terminated}</span>}
                  </div>
                  {/* Budget breakdown */}
                  <div style={{ borderTop: "1px solid #334155", paddingTop: 8, fontSize: 10 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                      <span style={{ color: "#64748B" }}>งบรวม</span>
                      <span style={{ color: "#F59E0B", fontWeight: 700 }}>{fmtB(budgetAll)}</span>
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 2 }}>
                      <span style={{ color: "#06B6D4" }}>ดำเนินการ</span>
                      <span style={{ color: "#94A3B8" }}>{fmtB(budgetActive)}</span>
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 2 }}>
                      <span style={{ color: "#22C55E" }}>รอปิด</span>
                      <span style={{ color: "#94A3B8" }}>{fmtB(budgetClosing)}</span>
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between" }}>
                      <span style={{ color: "#64748B" }}>ปิดแล้ว</span>
                      <span style={{ color: "#94A3B8" }}>{fmtB(budgetClosed)}</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </>)}

        {tab === "table" && (
          <div style={{ background: "#1E293B", borderRadius: 12, border: "1px solid #334155", overflow: "hidden" }}>
            <div style={{ padding: "14px 18px", borderBottom: "1px solid #334155", fontSize: 13, color: "#94A3B8", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
              <div>
                แสดง <strong style={{ color: "#E2E8F0" }}>{filtered.length}</strong> โครงการ
                {sortCol && <span style={{ marginLeft: 12, fontSize: 11, color: "#475569" }}>เรียงตาม {sortCol} ({sortDir})</span>}
              </div>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                {saveMsg && <span style={{ fontSize: 11, color: "#22C55E", fontWeight: 600 }}>{saveMsg}</span>}
                {Object.keys(statusOverrides).length > 0 && (
                  <span style={{ fontSize: 11, color: "#F59E0B" }}>แก้ไขแล้ว {Object.keys(statusOverrides).length} รายการ</span>
                )}
                {Object.keys(statusOverrides).length > 0 && (
                  <button onClick={resetAllOverrides} style={{ padding: "4px 10px", borderRadius: 4, border: "1px solid #DC2626", background: "#DC262620", color: "#DC2626", fontSize: 11, cursor: "pointer" }}>รีเซ็ตทั้งหมด</button>
                )}
                <span style={{ fontSize: 10, color: "#475569" }}>คลิกสถานะเพื่อแก้ไข</span>
              </div>
            </div>
            <div style={{ overflowX: "auto", maxHeight: 560, overflowY: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                <thead>
                  <tr style={{ background: "#0F172A", position: "sticky", top: 0, zIndex: 10 }}>
                    {[["year","ปี"],["code","รหัส"],["name","ชื่อโครงการ"],["pi","หัวหน้า"],["contractor","คู่สัญญา"],["totalBudget","งบทั้งหมด"],["duration","ระยะ"],["startDate","เริ่มต้น"],["endDate","สิ้นสุด"],["status","สถานะ"],["owner","นวค."]].map(([k,h]) => (
                      <th key={k} onClick={() => handleSort(k)} style={{ padding: "10px 10px", textAlign: "left", color: sortCol === k ? "#60A5FA" : "#64748B", fontWeight: 600, borderBottom: "2px solid #334155", whiteSpace: "nowrap", fontSize: 11, cursor: "pointer", userSelect: "none" }}>
                        {h} {sortCol === k ? (sortDir === "asc" ? "▲" : "▼") : ""}
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {sorted.map((d, i) => {
                    const s = si(d.status);
                    const isEditing = editingCode === d.code;
                    const isOverridden = !!statusOverrides[d.code];
                    return (
                      <tr key={i} style={{ borderBottom: "1px solid #1E293B", background: isOverridden ? "#1E3A5F22" : (i % 2 === 0 ? "transparent" : "#162032") }}>
                        <td style={{ padding: "9px 10px", whiteSpace: "nowrap" }}>{d.year}</td>
                        <td style={{ padding: "9px 10px", whiteSpace: "nowrap", color: "#60A5FA", fontFamily: "monospace", fontSize: 11 }}>{d.code}</td>
                        <td style={{ padding: "9px 10px", maxWidth: 280, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={d.name}>{d.name}</td>
                        <td style={{ padding: "9px 10px", whiteSpace: "nowrap" }}>{d.pi}</td>
                        <td style={{ padding: "9px 10px", maxWidth: 170, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={d.contractor}>{d.contractor}</td>
                        <td style={{ padding: "9px 10px", whiteSpace: "nowrap", textAlign: "right", fontFamily: "monospace", color: "#FCD34D" }}>{d.totalBudget ? (d.totalBudget / 1e6).toFixed(1) + "M" : "-"}</td>
                        <td style={{ padding: "9px 10px", textAlign: "center" }}>{d.duration ? d.duration + " ปี" : "-"}</td>
                        <td style={{ padding: "9px 10px", whiteSpace: "nowrap", fontSize: 11, color: "#94A3B8" }}>{d.startDate || "-"}</td>
                        <td style={{ padding: "9px 10px", whiteSpace: "nowrap", fontSize: 11, color: "#94A3B8" }}>{d.endDate || "-"}</td>
                        <td style={{ padding: "9px 10px", whiteSpace: "nowrap", position: "relative", minWidth: 180 }}>
                          {isEditing ? (
                            <select
                              value={d.status}
                              onChange={e => handleStatusChange(d.code, e.target.value)}
                              onBlur={() => setEditingCode(null)}
                              autoFocus
                              style={{ background: "#0F172A", color: "#E2E8F0", border: "1.5px solid #3B82F6", borderRadius: 4, padding: "4px 6px", fontSize: 10, width: 200, cursor: "pointer" }}
                            >
                              {STATUS_OPTIONS.map(opt => (
                                <option key={opt} value={opt}>{si(opt).l}</option>
                              ))}
                            </select>
                          ) : (
                            <span onClick={() => setEditingCode(d.code)} style={{ padding: "3px 8px", borderRadius: 4, fontSize: 10, fontWeight: 600, background: s.c + "20", color: s.c, border: "1px solid " + s.c + "40", cursor: "pointer", position: "relative", display: "inline-block" }} title="คลิกเพื่อแก้ไขสถานะ">
                              {s.l}
                              {isOverridden && <span style={{ position: "absolute", top: -4, right: -4, width: 8, height: 8, borderRadius: "50%", background: "#F59E0B" }} />}
                            </span>
                          )}
                        </td>
                        <td style={{ padding: "9px 10px", whiteSpace: "nowrap", fontWeight: 600, color: TC[d.owner] || "#94A3B8" }}>{d.owner}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}

        <div style={{ textAlign: "center", padding: "16px 0", color: "#334155", fontSize: 11 }}>
          Team Project Dashboard v2 — ข้อมูล clean จาก logbook ปี 2564-2569 • {liveData.length} โครงการ
          {Object.keys(statusOverrides).length > 0 && <span style={{ color: "#F59E0B" }}> • แก้ไขสถานะ {Object.keys(statusOverrides).length} รายการ (บันทึกอัตโนมัติ)</span>}
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(Dashboard));
</script>
</body>
</html>
